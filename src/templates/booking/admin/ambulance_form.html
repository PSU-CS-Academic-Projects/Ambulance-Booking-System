{% extends "base.html" %}
{% block title %}{{ action }} Ambulance{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} Ambulance Unit</h1>
    <a href="{% url 'admin_fleet' %}" class="btn btn--outline">← Back to Fleet</a>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<span class="form-error">{{ field.errors.0 }}</span>{% endif %}
        </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">{{ action }} Unit</button>
            <a href="{% url 'admin_fleet' %}" class="btn btn--outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
